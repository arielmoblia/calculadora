<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 20px;
            color: white;
            background-color: #d4002b; /* Changed to red */
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #a00020; /* Changed to darker red */
        }
        #display {
            grid-column: span 4;
            padding: 15px;
            font-size: 24px;
            background-color: #f1f1f1;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display">0</div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>
        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>/</button>
        <button>C</button>
    </div>
    <script>
        const buttons = document.querySelectorAll('button');
        const display = document.getElementById('display');
        let currentInput = '';

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.textContent;
                if (value === 'C') {
                    currentInput = '';
                    display.textContent = '0';
                } else if (value === '=') {
                    display.textContent = eval(currentInput);
                    currentInput = '';
                } else {
                    currentInput += value;
                    display.textContent = currentInput;
                }
            });
        });
    </script>
</body>
</html>
